<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#6D5DFC"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#C44DFF"/>
      <stop offset="100%" stop-color="#4A1F8A"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="16" fill="url(#bg)"/>

  <!-- Musical notes -->
  <g fill="#FFD700" opacity="0.8">
    <!-- Note 1 (top left) -->
    <circle cx="22" cy="20" r="4"/>
    <rect x="25" y="8" width="2" height="16"/>
    <path d="M27,8 Q35,5 27,14" fill="#FFD700"/>

    <!-- Note 2 (top right) -->
    <circle cx="75" cy="18" r="3.5"/>
    <rect x="78" y="7" width="2" height="14"/>
    <path d="M80,7 Q87,4 80,12" fill="#FFD700"/>
  </g>

  <!-- Tap circles (rhythm lane) -->
  <circle cx="30" cy="55" r="10" fill="none" stroke="#FF6B9D" stroke-width="2.5" opacity="0.9"/>
  <circle cx="50" cy="55" r="10" fill="none" stroke="#C44DFF" stroke-width="2.5" opacity="0.9"/>
  <circle cx="70" cy="55" r="10" fill="none" stroke="#6D5DFC" stroke-width="2.5" opacity="0.9"/>

  <!-- Active tap (center, filled) -->
  <circle cx="50" cy="55" r="8" fill="#C44DFF" opacity="0.6"/>

  <!-- Falling notes -->
  <circle cx="30" cy="35" r="4" fill="#FF6B9D"/>
  <circle cx="50" cy="42" r="4" fill="#C44DFF"/>
  <circle cx="70" cy="30" r="4" fill="#6D5DFC"/>

  <!-- Star burst (perfect hit) -->
  <g transform="translate(50, 55)" opacity="0.7">
    <line x1="0" y1="-14" x2="0" y2="-18" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="-10" x2="13" y2="-13" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="0" x2="18" y2="0" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="-18" y2="0" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-10" y1="-10" x2="-13" y2="-13" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- "PERFECT" text -->
  <text x="50" y="80" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFD700" font-family="sans-serif">PERFECT</text>
</svg>
