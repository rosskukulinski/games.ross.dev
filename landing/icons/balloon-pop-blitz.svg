<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#74B9FF"/>

  <!-- Sky gradient effect -->
  <rect width="100" height="100" rx="16" fill="url(#skyGrad)"/>
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#AEE6FF"/>
      <stop offset="100%" stop-color="#4A9EE8"/>
    </radialGradient>
  </defs>

  <!-- Red balloon (left) -->
  <line x1="30" y1="72" x2="32" y2="60" stroke="#888" stroke-width="1.2"/>
  <ellipse cx="30" cy="52" rx="12" ry="13.5" fill="#FF4444"/>
  <ellipse cx="30" cy="52" rx="12" ry="13.5" fill="url(#rg1)"/>
  <defs>
    <radialGradient id="rg1" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FF9999"/>
      <stop offset="100%" stop-color="#CC2222" stop-opacity="0.8"/>
    </radialGradient>
  </defs>
  <ellipse cx="26" cy="47" rx="4" ry="2.5" transform="rotate(-20 26 47)" fill="white" fill-opacity="0.55"/>
  <circle cx="30" cy="65" r="2.5" fill="#FF4444"/>

  <!-- Blue balloon (right) -->
  <line x1="70" y1="72" x2="68" y2="60" stroke="#888" stroke-width="1.2"/>
  <ellipse cx="70" cy="52" rx="12" ry="13.5" fill="#3399FF"/>
  <ellipse cx="70" cy="52" rx="12" ry="13.5" fill="url(#rg2)"/>
  <defs>
    <radialGradient id="rg2" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#88CCFF"/>
      <stop offset="100%" stop-color="#1166CC" stop-opacity="0.8"/>
    </radialGradient>
  </defs>
  <ellipse cx="66" cy="47" rx="4" ry="2.5" transform="rotate(-20 66 47)" fill="white" fill-opacity="0.55"/>
  <circle cx="70" cy="65" r="2.5" fill="#3399FF"/>

  <!-- Gold balloon (center, slightly raised) -->
  <line x1="50" y1="70" x2="50" y2="56" stroke="#888" stroke-width="1.2"/>
  <ellipse cx="50" cy="46" rx="13" ry="14.5" fill="#FFD700"/>
  <ellipse cx="50" cy="46" rx="13" ry="14.5" fill="url(#rg3)"/>
  <defs>
    <radialGradient id="rg3" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFEE88"/>
      <stop offset="100%" stop-color="#CC9900" stop-opacity="0.8"/>
    </radialGradient>
  </defs>
  <ellipse cx="45" cy="40" rx="4.5" ry="3" transform="rotate(-20 45 40)" fill="white" fill-opacity="0.6"/>
  <circle cx="50" cy="60" r="2.8" fill="#FFD700"/>
  <!-- Star on gold balloon -->
  <text x="50" y="50" text-anchor="middle" font-size="10" fill="white" opacity="0.9">💥</text>

  <!-- Pop burst (top right) -->
  <g transform="translate(78, 22)" opacity="0.9">
    <line x1="0" y1="-8" x2="0" y2="-13" stroke="#FF4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="5.6" y1="-5.6" x2="9.2" y2="-9.2" stroke="#FF4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="0" x2="13" y2="0" stroke="#FF4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="5.6" y1="5.6" x2="9.2" y2="9.2" stroke="#FF4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="8" x2="0" y2="13" stroke="#FF4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5.6" y1="5.6" x2="-9.2" y2="9.2" stroke="#FF4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="-13" y2="0" stroke="#FF4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5.6" y1="-5.6" x2="-9.2" y2="-9.2" stroke="#FF4444" stroke-width="2" stroke-linecap="round"/>
    <circle r="5" fill="#FF4444" opacity="0.3"/>
  </g>

  <!-- Score popup hint -->
  <text x="72" y="28" text-anchor="middle" font-size="8" font-weight="bold" fill="#FFD700" stroke="black" stroke-width="0.5">+5</text>

  <!-- Strings dangling down -->
  <path d="M30,74 Q32,82 28,88" stroke="#888" stroke-width="1" fill="none"/>
  <path d="M50,73 Q50,82 50,88" stroke="#888" stroke-width="1" fill="none"/>
  <path d="M70,74 Q68,82 72,88" stroke="#888" stroke-width="1" fill="none"/>
</svg>
