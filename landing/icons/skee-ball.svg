<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#E17055"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FAB1A0"/>
      <stop offset="100%" stop-color="#D35400"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="16" fill="url(#bg)"/>

  <!-- Ramp -->
  <path d="M20,85 L35,30 L65,30 L80,85 Z" fill="#8B6914" stroke="#6B4F12" stroke-width="1.5"/>
  <path d="M25,80 L37,35 L63,35 L75,80 Z" fill="#D4A843" opacity="0.5"/>

  <!-- Target rings -->
  <circle cx="50" cy="28" r="7" fill="none" stroke="#FFD700" stroke-width="2"/>
  <circle cx="50" cy="28" r="4" fill="#FF4444" stroke="#CC0000" stroke-width="1"/>
  <text x="50" y="31" text-anchor="middle" font-size="6" font-weight="bold" fill="white">50</text>

  <circle cx="38" cy="38" r="5.5" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <circle cx="38" cy="38" r="3" fill="#FF8844" stroke="#CC6622" stroke-width="1"/>
  <text x="38" y="40.5" text-anchor="middle" font-size="5" font-weight="bold" fill="white">30</text>

  <circle cx="62" cy="38" r="5.5" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <circle cx="62" cy="38" r="3" fill="#FF8844" stroke="#CC6622" stroke-width="1"/>
  <text x="62" y="40.5" text-anchor="middle" font-size="5" font-weight="bold" fill="white">30</text>

  <circle cx="50" cy="48" r="6" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <circle cx="50" cy="48" r="3.5" fill="#4488FF" stroke="#2266CC" stroke-width="1"/>
  <text x="50" y="50.5" text-anchor="middle" font-size="5" font-weight="bold" fill="white">20</text>

  <!-- Ball rolling up -->
  <circle cx="50" cy="70" r="5" fill="#DCDCDC"/>
  <circle cx="50" cy="70" r="5" fill="url(#ballShine)"/>
  <defs>
    <radialGradient id="ballShine" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#AAAAAA" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <!-- Score burst -->
  <text x="76" y="20" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFD700" stroke="#333" stroke-width="0.5">100</text>
</svg>
