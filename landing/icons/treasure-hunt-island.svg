<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#2d9b5e"/>
  <defs>
    <radialGradient id="islandGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3cc47c"/>
      <stop offset="100%" stop-color="#1a6b3c"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="16" fill="url(#islandGrad)"/>

  <!-- Water waves at bottom -->
  <path d="M0,78 Q12,74 25,78 T50,78 T75,78 T100,78 L100,100 L0,100 Z" fill="#2196F3" opacity="0.4"/>
  <path d="M0,82 Q15,78 30,82 T60,82 T90,82 T100,82 L100,100 L0,100 Z" fill="#1976D2" opacity="0.3"/>

  <!-- Island mound -->
  <ellipse cx="50" cy="75" rx="30" ry="10" fill="#c2a052"/>
  <ellipse cx="50" cy="73" rx="28" ry="8" fill="#d4b96a"/>

  <!-- Palm tree -->
  <line x1="38" y1="72" x2="35" y2="48" stroke="#8B5E3C" stroke-width="3" stroke-linecap="round"/>
  <path d="M35,48 Q25,42 18,46" stroke="#228B22" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M35,48 Q30,38 22,36" stroke="#2E8B57" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M35,48 Q42,40 48,38" stroke="#228B22" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M35,48 Q40,44 50,46" stroke="#2E8B57" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Treasure chest -->
  <rect x="52" y="62" width="18" height="12" rx="2" fill="#8B4513"/>
  <rect x="52" y="62" width="18" height="6" rx="2" fill="#A0522D"/>
  <rect x="54" y="64" width="14" height="2" rx="1" fill="#CD853F"/>
  <circle cx="61" cy="70" r="2" fill="#FFD700"/>
  <!-- Gold coins spilling out -->
  <circle cx="57" cy="60" r="3" fill="#FFD700"/>
  <circle cx="57" cy="60" r="3" fill="url(#coinGrad)"/>
  <circle cx="63" cy="59" r="3" fill="#FFD700"/>
  <circle cx="63" cy="59" r="3" fill="url(#coinGrad)"/>
  <circle cx="60" cy="57" r="3" fill="#FFD700"/>
  <circle cx="60" cy="57" r="3" fill="url(#coinGrad)"/>
  <defs>
    <radialGradient id="coinGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#F9A825" stop-opacity="0.8"/>
    </radialGradient>
  </defs>

  <!-- Treasure map / X marks the spot -->
  <g transform="translate(50, 28)" opacity="0.9">
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#FF4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#FF4444" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Sparkles -->
  <circle cx="20" cy="25" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="78" cy="18" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="82" cy="42" r="1" fill="white" opacity="0.6"/>
  <circle cx="15" cy="55" r="1" fill="white" opacity="0.6"/>
</svg>
