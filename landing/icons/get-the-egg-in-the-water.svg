<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#2EC4B6"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3DD5C7"/>
      <stop offset="100%" stop-color="#1A9E92"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="16" fill="url(#bg)"/>

  <!-- Water in a bowl -->
  <ellipse cx="50" cy="72" rx="30" ry="8" fill="#1565C0" opacity="0.3"/>
  <path d="M20,62 Q20,80 50,80 Q80,80 80,62 Z" fill="#42A5F5"/>
  <path d="M20,62 Q20,80 50,80 Q80,80 80,62" fill="none" stroke="#1E88E5" stroke-width="2"/>
  <!-- Water surface shine -->
  <ellipse cx="45" cy="66" rx="15" ry="3" fill="white" opacity="0.25"/>
  <!-- Bowl rim -->
  <path d="M18,62 Q18,58 22,58 L78,58 Q82,58 82,62" fill="none" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>

  <!-- Egg -->
  <ellipse cx="50" cy="36" rx="12" ry="16" fill="#FFF8E1"/>
  <ellipse cx="50" cy="36" rx="12" ry="16" fill="url(#eggShine)"/>
  <defs>
    <radialGradient id="eggShine" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F5E6C8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Splash drops -->
  <circle cx="35" cy="55" r="2" fill="#90CAF9" opacity="0.7"/>
  <circle cx="62" cy="53" r="1.5" fill="#90CAF9" opacity="0.6"/>
  <circle cx="42" cy="51" r="1.8" fill="#90CAF9" opacity="0.5"/>

  <!-- Down arrow hint -->
  <g transform="translate(50, 36)" opacity="0.4">
    <line x1="0" y1="6" x2="0" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <polyline points="-4,9 0,13 4,9" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
