name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore build manifest
        uses: actions/cache@v4
        with:
          path: .build-cache.json
          key: build-manifest-${{ github.ref_name }}
          restore-keys: build-manifest-

      - name: Restore game dependencies
        uses: actions/cache@v4
        with:
          path: |
            games/guess-the-drawing/node_modules
            games/hanyverse/node_modules
            games/pet-care-game/node_modules
            games/phase-10/node_modules
            games/sir-name-alot/node_modules
            games/unicorn-dragon/node_modules
          key: deps-${{ hashFiles('games/*/package-lock.json') }}
          restore-keys: deps-

      - name: Restore dist outputs
        uses: actions/cache@v4
        with:
          path: dist
          key: dist-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            dist-${{ github.ref_name }}-
            dist-

      - name: Build all games
        run: node scripts/build-all.js

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=games-ross-dev --branch=${{ github.head_ref }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const slug = branch.replace(/[^a-z0-9-]/gi, '-').substring(0, 28);
            const previewUrl = `https://${slug}.games-ross-dev.pages.dev`;
            const body = `🎮 **Preview deployed!**\n\n${previewUrl}`;

            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
