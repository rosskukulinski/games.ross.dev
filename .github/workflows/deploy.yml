name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            .build-cache.json
            dist
          key: build-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            build-${{ github.ref_name }}-
            build-main-
            build-

      - name: Restore game dependencies
        uses: actions/cache@v4
        with:
          path: |
            games/balloon-pop-blitz/node_modules
            games/guess-the-drawing/node_modules
            games/hanyverse/node_modules
            games/pet-care-game/node_modules
            games/phase-10/node_modules
            games/sir-name-alot/node_modules
            games/treasure-hunt-island/node_modules
            games/unicorn-dragon/node_modules
          key: deps-${{ hashFiles('games/*/package-lock.json') }}
          restore-keys: deps-

      - name: Build all games
        run: node scripts/build-all.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=games-ross-dev
